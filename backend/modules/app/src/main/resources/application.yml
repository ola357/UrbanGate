spring:
  application:
    name: urbangate-backend
  profiles:
    active: dev

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: true
    out-of-order: true
    locations:
      - classpath:db/migration
    table: flyway_schema_history


  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 2000ms
          enabled: true




server:
  port: 8002

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true


keycloak:
  url: ${KEYCLOAK_URL:http://localhost:8088}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  admin-password: ug-admin_password
  admin-username: admin
  public-client-id: mobile-app





urbangate:
  env: dev
