spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/urbangate
    username: urbangate
    password: urbangate
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

urbangate:
  env: dev
