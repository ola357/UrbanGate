services:
  sonar_db:
    image: postgres:16
    container_name: ug-sonar-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - ug_sonar_db_data:/var/lib/postgresql/data

  sonarqube:
    image: sonarqube:lts-community
    container_name: ug-sonarqube
    depends_on:
      - sonar_db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - ug_sonar_data:/opt/sonarqube/data
      - ug_sonar_extensions:/opt/sonarqube/extensions
      - ug_sonar_logs:/opt/sonarqube/logs

volumes:
  ug_sonar_data:
  ug_sonar_extensions:
  ug_sonar_logs:
  ug_sonar_db_data:
