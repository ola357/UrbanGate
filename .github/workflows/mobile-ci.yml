name: Mobile CI

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: mobile

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      # Metro + Expo caches (speeds up repeated CI runs)
      - name: Cache Metro + Expo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/metro
            ~/.expo
            mobile/.expo
          key: ${{ runner.os }}-metro-expo-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-metro-expo-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (CI)
        run: npm run test -- --ci

      - name: Coverage
        run: npm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
          if-no-files-found: error
          retention-days: 14

      - name: SonarCloud scan (mobile)
        # Skip Sonar on fork PRs (secrets not available)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: mobile
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_MOBILE_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  eas-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "EXPO_TOKEN is missing. Add it as a GitHub Actions secret."
            exit 1
          fi

      - name: EAS Build (prod)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas whoami
          eas build --platform all --profile prod --non-interactive
