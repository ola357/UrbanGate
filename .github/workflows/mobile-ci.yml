name: Mobile CI

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

  push:
    branches:
      - main
      - develop
      - staging
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-ci.yml"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: mobile

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    environment: dev
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_MOBILE_PROJECT_KEY || secrets.SONAR_PROJECT_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: mobile/pnpm-lock.yaml

      # Metro + Expo caches (speeds up repeated CI runs)
      - name: Cache Metro + Expo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/metro
            ~/.expo
            mobile/.expo
          key: ${{ runner.os }}-metro-expo-${{ hashFiles('mobile/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-metro-expo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests (CI)
        run: pnpm run test:ci

      - name: Coverage
        run: pnpm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage
          if-no-files-found: error
          retention-days: 14

      - name: Validate Sonar configuration
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_ORGANIZATION}" ] || [ -z "${SONAR_PROJECT_KEY}" ]; then
            echo "Missing Sonar secrets. Ensure SONAR_TOKEN, SONAR_ORGANIZATION, and SONAR_MOBILE_PROJECT_KEY (or SONAR_PROJECT_KEY) are set."
            exit 1
          fi

      - name: SonarCloud scan (mobile)
        # Skip Sonar on fork PRs (secrets not available)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: SonarSource/sonarcloud-github-action@v3
        with:
          projectBaseDir: mobile
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      - name: Show Sonar quality gate details
        if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            curl -s -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}&pullRequest=${{ github.event.pull_request.number }}" \
              | python -m json.tool
          else
            curl -s -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=${SONAR_PROJECT_KEY}&branch=${{ github.ref_name }}" \
              | python -m json.tool
          fi

  eas-build:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    environment: dev
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: mobile/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: pnpm add -g eas-cli

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "EXPO_TOKEN is missing. Add it as a GitHub Actions secret."
            exit 1
          fi

      - name: Select EAS build profile
        id: eas-profile
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "profile=dev" >> "$GITHUB_OUTPUT"
          else
            echo "profile=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas whoami
          eas build --platform all --profile "${{ steps.eas-profile.outputs.profile }}" --non-interactive
