name: Mobile CD (EAS Build)

on:
  push:
    branches: [ main ]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-cd-main
  cancel-in-progress: true

defaults:
  run:
    working-directory: mobile

jobs:
  eas-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm i -g eas-cli

      - name: Verify Expo token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "EXPO_TOKEN is missing. Add it as a GitHub Actions secret."
            exit 1
          fi

      - name: EAS Build (prod)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas whoami
          eas build --platform all --profile prod --non-interactive
