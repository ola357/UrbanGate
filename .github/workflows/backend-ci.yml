name: Backend CI + CD

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "GitVersion.yml"

  push:
    branches:
      - "main"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "GitVersion.yml"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write

concurrency:
  group: backend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr_guard:
    name: PR guard (skip push with open PR)
    runs-on: ubuntu-latest

    outputs:
      has_open_pr: ${{ steps.check.outputs.has_open_pr }}

    steps:
      - name: Detect open PR for branch
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== 'push') {
              core.setOutput('has_open_pr', 'false')
              return
            }

            const branch = context.ref.replace('refs/heads/', '')
            const head = `${context.repo.owner}:${branch}`
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head,
              per_page: 1
            })

            core.setOutput('has_open_pr', prs.length > 0 ? 'true' : 'false')

  ci:
    name: CI (tests, quality, sonar)
    runs-on: ubuntu-latest
    environment: dev
    needs: [ pr_guard ]
    if: ${{ github.event_name != 'push' || needs.pr_guard.outputs.has_open_pr == 'false' }}

    defaults:
      run:
        working-directory: backend

    outputs:
      semver: ${{ steps.gitversion.outputs.semver }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build + test + quality checks
        run: ./gradlew clean check spotlessCheck

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud analysis (wait for quality gate)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          ./gradlew sonar \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

      - name: Setup .NET (for GitVersion)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install GitVersion
        run: dotnet tool install --global GitVersion.Tool

      - name: Compute version (repo root)
        id: gitversion
        working-directory: .
        run: |
          set -euo pipefail
          OUT_LOG="$(mktemp)"
          ERR_LOG="$(mktemp)"
          if ! dotnet-gitversion /config GitVersion.yml /showvariable SemVer >"$OUT_LOG" 2>"$ERR_LOG"; then
            echo "GitVersion failed. stdout:"
            cat "$OUT_LOG"
            echo "GitVersion failed. stderr:"
            cat "$ERR_LOG"
            echo "Re-running GitVersion with full output for diagnostics:"
            dotnet-gitversion /config GitVersion.yml || true
            rm -f "$OUT_LOG" "$ERR_LOG"
            exit 1
          fi
          if [ -s "$ERR_LOG" ]; then
            echo "GitVersion warnings:"
            cat "$ERR_LOG"
          fi
          SEMVER="$(cat "$OUT_LOG")"
          rm -f "$OUT_LOG" "$ERR_LOG"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "GitVersion semver: $SEMVER"

      - name: Compute vars
        id: vars
        working-directory: .
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build_image:
    name: Build & Push GHCR image
    runs-on: ubuntu-latest
    needs: [ ci ]
    environment: dev

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          OWNER_LC="${{ needs.ci.outputs.owner_lc }}"
          IMAGE="ghcr.io/${OWNER_LC}/urbangate-backend:${{ needs.ci.outputs.semver }}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ghcr.io/${{ needs.ci.outputs.owner_lc }}/urbangate-backend:sha-${{ needs.ci.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag latest (main only)
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ghcr.io/${{ needs.ci.outputs.owner_lc }}/urbangate-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_dev:
    name: Deploy to ACA (dev)
    runs-on: ubuntu-latest
    needs: [ build_image, ci ]
    environment: dev

    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/') }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update DB secret in ACA (db-password)
        run: |
          az containerapp secret set \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets db-password='${{ secrets.TF_VAR_PG_ADMIN_PASSWORD }}'

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ needs.build_image.outputs.image }}" \
            --set-env-vars APP_VERSION="${{ needs.ci.outputs.semver }}" GIT_SHA="${{ github.sha }}"
