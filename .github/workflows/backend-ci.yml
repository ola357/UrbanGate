name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop
      - staging
  push:
    branches:
      - main
      - develop
      - staging
      - "feature/**"
      - "chore/**"
      - "bug/**"
      - "task/**"
      - "fix/**"
      - "hotfix/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: backend

jobs:
  build-backend-app:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Check for open PR
        id: pr_check
        if: ${{ github.event_name == 'push' }}
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`;
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              head: headRef
            });
            core.setOutput("has_pr", pulls.length > 0 ? "true" : "false");

      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'push' || steps.pr_check.outputs.has_pr != 'true' }}
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        if: ${{ github.event_name != 'push' || steps.pr_check.outputs.has_pr != 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Cache Sonar packages
        if: ${{ github.event_name != 'push' || steps.pr_check.outputs.has_pr != 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build + test + quality checks
        if: ${{ github.event_name != 'push' || steps.pr_check.outputs.has_pr != 'true' }}
        run: ./gradlew clean check spotlessCheck

      - name: SonarCloud analysis
        if: ${{ (github.event_name != 'push' || steps.pr_check.outputs.has_pr != 'true') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && secrets.SONAR_PROJECT_KEY != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          ./gradlew sonarqube \
            -Dsonar.projectKey=$SONAR_PROJECT_KEY \
            -Dsonar.organization=$SONAR_ORGANIZATION \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN
      
