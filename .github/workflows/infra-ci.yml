name: Infra CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"

  push:
    branches: [ "main" ]
    paths:
      - "infra/**"
      - ".github/workflows/infra-ci.yml"

  workflow_dispatch:
    inputs:
      action:
        description: "plan, apply, or destroy"
        required: true
        default: "plan"
      environment:
        description: "Optional single environment (e.g. dev). Leave empty for all."
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: infra-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  list_envs:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.set.outputs.envs }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environments
        id: set
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.event.inputs.environment }}" ]; then
            echo "envs=[\"${{ github.event.inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d infra/envs ]; then
            echo "envs=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          envs=$(ls -1 infra/envs | jq -R -s -c 'split("\n")[:-1]')
          echo "envs=$envs" >> "$GITHUB_OUTPUT"

  terraform:
    runs-on: ubuntu-latest
    needs: [ list_envs ]
    if: ${{ needs.list_envs.outputs.envs != '[]' }}
    environment: ${{ matrix.env }}

    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.list_envs.outputs.envs) }}

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.env }}

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_pg_admin_password: ${{ secrets.TF_VAR_PG_ADMIN_PASSWORD || vars.TF_VAR_PG_ADMIN_PASSWORD }}
      TF_IN_AUTOMATION: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'plan' }}
        run: terraform plan -input=false

      - name: Apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' }}
        run: terraform apply -input=false -auto-approve

      - name: Destroy (non-prod only)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' && matrix.env != 'prod' }}
        run: terraform destroy -input=false -auto-approve
