mode: ContinuousDelivery
next-version: 0.1.0

branches:
  main:
    regex: ^main$
    increment: Minor
    is-mainline: true
    prevent-increment-of-merged-branch-version: true
    track-merge-target: true
    source-branches: [ feature ]
    tag: ""

  feature:
    regex: ^feature[/-]
    increment: Inherit
    source-branches: [ main ]
    tag: useBranchName

ignore:
  sha: []
merge-message-formats: {}
